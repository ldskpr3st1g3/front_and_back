<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Заметки PWA</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/favicon-32x32.png" />
    <meta name="theme-color" content="#667eea" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📝 Заметки</h1>
        <nav>
          <button id="home-btn" class="nav-btn active">Главная</button>
          <button id="about-btn" class="nav-btn">О приложении</button>
        </nav>
        <div class="push-controls">
          <button id="enable-push" class="push-btn">
            🔔 Включить уведомления
          </button>
          <button id="disable-push" class="push-btn" style="display: none">
            🔕 Выключить уведомления
          </button>
        </div>
      </header>

      <main id="app-content"></main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
